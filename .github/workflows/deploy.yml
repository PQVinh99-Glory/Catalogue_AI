name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Nhánh mặc định khi push code từ StackBlitz lên

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Thư mục chứa mã nguồn đã biên dịch của Vite
          branch: gh-pages # Nhánh đích chứa trang web tĩnh để chạy online